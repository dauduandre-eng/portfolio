<header class="site-header site-header--sticky">
  <nav class="navbar navbar-expand-md py-3">
    <div class="container">
      <a class="navbar-brand" href="{% url 'core:home' %}">Daudu Andrew</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
              data-bs-target="#navMain" aria-controls="navMain"
              aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navMain">
        <ul class="navbar-nav ms-auto align-items-md-center gap-md-1">
          <li class="nav-item">
            <a class="nav-link {% if active_nav == 'home' %}active{% endif %}"
               {% if active_nav == 'home' %}aria-current="page"{% endif %}
               href="{% url 'core:home' %}">Home</a>
          </li>
          <li class="nav-item">
            <a class="nav-link {% if active_nav == 'projects' %}active{% endif %}"
               {% if active_nav == 'projects' %}aria-current="page"{% endif %}
               href="{% url 'projects:list' %}">Projects</a>
          </li>
          <li class="nav-item">
            <a class="nav-link {% if active_nav == 'blog' %}active{% endif %}"
               {% if active_nav == 'blog' %}aria-current="page"{% endif %}
               href="{% url 'blog:list' %}">Blog</a>
          </li>
          <li class="nav-item">
            <a class="nav-link {% if active_nav == 'about' %}active{% endif %}"
               {% if active_nav == 'about' %}aria-current="page"{% endif %}
               href="{% url 'core:about' %}">About</a>
          </li>
          <li class="nav-item ms-md-2">
            <a class="btn btn-sm btn-primary" href="{% url 'contact:contact' %}">Get in touch</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>
</header>
